name: Feature request
description: Suggest an input/UI feature, or a new controller binding/behavior
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before requesting a brand-new hook target or input-emulation exception,
        check `re_notes/known_issues.md` and the open tasks in the README —
        it might already be tracked. For anything touching `iw5mp.exe` or a
        new synthetic-input exception, please expect discussion before it's
        picked up (see `CONTRIBUTING.md`).

  - type: textarea
    id: feature
    attributes:
      label: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      description: What's the real gameplay/UX gap this closes?
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Anything else? (known real bind name, offset, or existing console behavior to match)
    validations:
      required: false
